name: Sync Exam Bundles

on:
  push:
    branches:
      - main
    paths:
      - 'content/exams/*.yaml'
  workflow_dispatch:
    inputs:
      bundle_paths:
        description: "Space-separated content/exams/*.yaml paths"
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify required secrets
        shell: bash
        run: |
          if [[ -z "$SUPABASE_URL" || -z "$SUPABASE_SERVICE_ROLE_KEY" ]]; then
            echo "SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY must be configured as GitHub Actions secrets."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve bundle paths
        id: bundles
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            paths="${{ github.event.inputs.bundle_paths }}"
          else
            paths=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'content/exams/*.yaml' | tr '\n' ' ')
          fi

          paths=$(echo "$paths" | xargs)

          if [[ -z "$paths" ]]; then
            echo "No content/exams/*.yaml changes detected."
            echo "paths=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "paths=$paths" >> "$GITHUB_OUTPUT"

      - name: Sync approved exam bundles
        if: steps.bundles.outputs.paths != ''
        run: npm run exam -- sync-bundles ${{ steps.bundles.outputs.paths }}
